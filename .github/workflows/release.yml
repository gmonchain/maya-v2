name: Release

# Publishes a notarized Maya.dmg to GitHub Releases.
# Trigger it by pushing a version tag:
#     git tag v1.0.0 && git push origin v1.0.0
# Or run it manually from the Actions tab.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    # Maya needs Xcode 26.5 / the macOS 26 SDK. If the macos-26 image is not
    # available on your account yet, switch to the newest macOS runner you
    # have and adjust the "Select Xcode" step below.
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        run: sudo xcode-select -switch /Applications/Xcode_26.5.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"

          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db

      - name: Build, sign, notarize & package
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: ./scripts/build-release.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Maya-dmg
          path: build/Maya.dmg

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            build/Maya.dmg \
            --title "Maya ${GITHUB_REF_NAME}" \
            --generate-notes
